<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F0F0F"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>

    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C42026"/>
      <stop offset="100%" stop-color="#C42026" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="gridFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Grid fade overlay so grid fades toward bottom -->
  <rect width="1200" height="630" fill="url(#gridFade)"/>

  <!-- Red accent — top horizontal bar -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accentLine)"/>

  <!-- Large faint circle — right side depth element -->
  <circle cx="1050" cy="315" r="380" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.04"/>
  <circle cx="1050" cy="315" r="280" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.04"/>
  <circle cx="1050" cy="315" r="180" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.05"/>

  <!-- Thin vertical rule — left margin -->
  <line x1="100" y1="80" x2="100" y2="550" stroke="#FFFFFF" stroke-width="0.5" opacity="0.1"/>

  <!-- Red accent dot at top of vertical rule -->
  <circle cx="100" cy="80" r="3" fill="#C42026"/>

  <!-- Category label -->
  <text
    x="124" y="86"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="11"
    font-weight="600"
    fill="#C42026"
    letter-spacing="3"
    text-anchor="start"
  >CHERRYPICK STUDIO</text>

  <!-- Thin separator line after category -->
  <line x1="124" y1="102" x2="420" y2="102" stroke="#FFFFFF" stroke-width="0.5" opacity="0.15"/>

  <!-- Main wordmark -->
  <text
    x="124" y="310"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="88"
    font-weight="700"
    fill="#FFFFFF"
    letter-spacing="-3"
    text-anchor="start"
  >Cherrypick</text>
  <text
    x="124" y="410"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="88"
    font-weight="700"
    fill="#C42026"
    letter-spacing="-3"
    text-anchor="start"
  >Studio</text>

  <!-- Descriptor text -->
  <text
    x="124" y="468"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="16"
    font-weight="400"
    fill="#666666"
    letter-spacing="1"
    text-anchor="start"
  >Design resources, guides &#38; tutorials</text>

  <!-- Bottom horizontal rule -->
  <line x1="100" y1="518" x2="1100" y2="518" stroke="#FFFFFF" stroke-width="0.5" opacity="0.08"/>

  <!-- Bottom left — URL -->
  <text
    x="124" y="546"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="12"
    font-weight="400"
    fill="#444444"
    letter-spacing="1"
    text-anchor="start"
  >cherrypick.design</text>

  <!-- Bottom right — Blog label -->
  <text
    x="1076" y="546"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="11"
    font-weight="600"
    fill="#444444"
    letter-spacing="3"
    text-anchor="end"
  >BLOG</text>

  <!-- Right side — thin vertical accent stack -->
  <rect x="1076" y="200" width="2" height="40" fill="#C42026" opacity="0.8"/>
  <rect x="1076" y="248" width="2" height="20" fill="#C42026" opacity="0.4"/>
  <rect x="1076" y="276" width="2" height="10" fill="#C42026" opacity="0.2"/>
</svg>
